name: Auto-refresh IG Data

on:
  schedule:
    - cron: '0 1,7,13,19 * * *'  # 每天 01:00 07:00 13:00 19:00 UTC（马来西亚时间 +8）
  workflow_dispatch:              # 允许手动触发

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: node scraper.js

      - name: Commit & push ig_data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ig_data.json
          git diff --staged --quiet && echo "No changes, skipping commit." || \
            (git commit -m "data: auto-refresh ig_data.json $(date -u +%Y-%m-%d\ %H:%M\ UTC)" && git push)
